target-version = "py310"
line-length = 100

[lint]
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "W",     # pycodestyle warnings
]

[lint.isort]
known-first-party = ["recipe_dedupe"]

[lint.per-file-ignores]
# CSS/JS/HTML string templates exceed the line-length limit.
"recipe_dedupe/dashboard.py" = ["E501"]
