name: Dashboard Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "47 2 * * 1"  # Weekly Monday 2:47 UTC

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    if: github.repository_owner == 'homebysix'  # Remove to build dashboard on forks
    runs-on: ubuntu-latest

    steps:
      - name: Check out tracker repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Clone AutoPkg org repos
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/clone_repos.sh autopkg

      - name: Build dashboard
        run: >
          python3 dedupe.py
          --repos-dir autopkg
          --output-dir docs
          --override-repos data/override_repos.json
          --override-sets data/override_sets.json

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docs/index.html docs/dashboard.json
          git diff --staged --quiet || git commit -m "Refresh dashboard data"
          git push
